name: Daily scrape and deploy

on:
  schedule:
    # Tous les jours à 08:00 UTC
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-and-pages
  cancel-in-progress: false

jobs:
  scrape-build:
    name: Scrape, commit data, build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (scrapers)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install scraper dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: |
          npx puppeteer browsers install chrome
          sudo -E env "PATH=$PATH" npx puppeteer browsers install chrome --install-deps

      - name: Run all scrapers
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
        run: npm run scrapall

      - name: Commit daily snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/data/snapshots frontend/src/data/active-date.json
          if git diff --staged --quiet; then
            echo "Aucun changement de snapshot à committer."
          else
            git commit -m "chore(data): snapshots $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: scrape-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
